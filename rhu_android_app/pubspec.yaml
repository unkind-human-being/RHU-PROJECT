name: rhu_android_app
description: Tawi-Tawi RHU Mobile Portal for health updates and medicine supply monitoring.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  http: ^1.6.0
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.5
  intl: ^0.20.2
  uuid: ^4.5.2
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^20.1.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  agora_rtc_engine: ^6.5.4
  permission_handler: ^12.0.1
  image_picker: ^1.2.1
  

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/rhu_profiles/
    - assets/icons/